# =============================================================================
# netmon configuration
# -----------------------------------------------------------------------------
# This file is SOURCED by bash. Keep the shell syntax valid:
#   - scalars:  NAME="value"
#   - arrays:   NAME=( "a" "b" "c" )   (one target per line is fine)
#   - comments: lines starting with #
#
# To keep site-specific / sensitive targets out of git, copy this file to
#   config/netmon.local.conf
# and put your real values there. If that file exists it is sourced LAST and
# overrides anything below. (netmon.local.conf is git-ignored.)
# =============================================================================

# --- Identity of this probe ---------------------------------------------------
# Which access segment is this Debian box plugged into? Use one of: lan wifi guest
# Every metric row is tagged with this so the same toolkit on three boxes (or
# one box moved around) can be compared later.
SEGMENT="lan"
# Free-text note stored alongside results (site, desk, VLAN, etc.).
# Set this per deployment -- or better, put it in config/netmon.local.conf.
SITE=""

# Collect IPv6 data where applicable (public IP + MTU). Set to 0 if the site is
# IPv4-only to avoid noisy "unreachable" results.
IPV6_ENABLED=1
# Bind probes to a specific egress path (optional). Leave both empty to use the
# OS default route. This is useful on a multi-homed box, or when you want one
# config per segment/interface. SOURCE_INTERFACE is preferred where tools accept
# an interface; SOURCE_IP is used for tools that can only bind an address.
SOURCE_INTERFACE=""   # e.g. "eth1" on Debian
SOURCE_IP=""          # e.g. "10.20.30.40"

# =============================================================================
# ping  -- latency / packet loss / jitter
# =============================================================================
PING_ENABLED=1
PING_COUNT=20            # echo requests per target per run
PING_INTERVAL=0.2        # seconds between requests (0.2 is the min for non-root)
PING_DEADLINE=15         # overall seconds budget per target
# The default gateway is auto-detected and always probed when this is 1.
PING_INCLUDE_GATEWAY=1
PING_TARGETS=(
  "1.1.1.1"              # Cloudflare (internet reachability / baseline)
  "8.8.8.8"              # Google DNS (second opinion / path diversity)
  # "192.168.10.1"       # TODO: your default gateway (or leave PING_INCLUDE_GATEWAY=1)
  # "10.0.0.10"          # TODO: an internal server (file/AD/proxy)
)

# =============================================================================
# traceroute  -- path mapping + path-change detection
# =============================================================================
TRACE_ENABLED=1
TRACE_CYCLES=3           # probes per hop (used by mtr --report)
TRACE_MAX_HOPS=30
TRACE_TARGETS=(
  "1.1.1.1"
  "8.8.8.8"
  # "your-webapp.example.com"   # TODO: a reauth-affected web app host
)

# =============================================================================
# mtu  -- Path MTU discovery (DF-bit ping) + PMTU black-hole detection
# =============================================================================
MTU_ENABLED=1
MTU_MIN=1200             # lower bound of the binary search (payload floor)
MTU_MAX=1500             # upper bound (standard Ethernet)
MTU_TARGETS=(
  "1.1.1.1"
  "8.8.8.8"
  # "your-webapp.example.com"   # TODO: probe the path to the affected apps
)

# =============================================================================
# dns  -- resolution latency + answer consistency across resolvers
# =============================================================================
DNS_ENABLED=1
DNS_TIMEOUT=2            # seconds per query
# "system" means the box's configured resolver (no @server). Others are queried
# explicitly so you can compare internal DNS vs public DNS.
DNS_RESOLVERS=(
  "system"
  "1.1.1.1"
  "8.8.8.8"
  # "192.168.10.1"       # TODO: your internal/gateway resolver
)
DNS_NAMES=(
  "cloudflare.com"       # control domain (should always resolve fast)
  # "your-webapp.example.com"    # TODO: names of the reauth-affected apps
  # "login.microsoftonline.com"  # example: common SSO endpoint
)

# =============================================================================
# publicip  -- egress public IP (v4/v6) + ASN; flapping / multi-egress detection
# This is the primary signal for the "forced reauthentication" hypothesis:
# if the public source IP changes mid-session, many web apps drop the session.
# =============================================================================
PUBLICIP_ENABLED=1
PUBLICIP_TIMEOUT=5       # seconds per service
# Several independent services are queried each run. If they disagree within a
# single sample, traffic is leaving via more than one egress (dual-WAN / NAT
# pool / load balancing) -- a strong lead for the reauth complaints.
PUBLICIP_SERVICES=(
  "https://api.ipify.org"
  "https://ifconfig.me/ip"
  "https://icanhazip.com"
  "https://checkip.amazonaws.com"
)
# Optional JSON endpoint used to enrich with ASN/org (requires jq). Leave empty
# to skip enrichment.
PUBLICIP_ASN_URL="https://ifconfig.co/json"

# =============================================================================
# http  -- per web-app timing / status / TLS cert expiry + captive-portal check
# =============================================================================
HTTP_ENABLED=1
HTTP_TIMEOUT=15          # seconds per URL
# Full URLs of the web apps where users get logged out. Fill these in -- the
# timing breakdown + status + TLS handshake time are most useful on the real
# endpoints.
HTTP_TARGETS=(
  "https://www.cloudflare.com"   # placeholder so the test does something useful
  # "https://your-webapp.example.com/health"   # TODO: real reauth-affected apps
)
# Captive-portal / connectivity probe. A correctly working path returns HTTP 204
# with no body. A redirect or 200-with-body means something is intercepting
# traffic (common on Guest WiFi). 
CAPTIVE_CHECK_URL="http://connectivitycheck.gstatic.com/generate_204"

# =============================================================================
# throughput  -- bandwidth (speedtest-cli and/or iperf3)
# DISABLED by default: running a speed test every few minutes saturates the link
# and skews the very latency/loss you are measuring. Enable it for occasional
# runs, or schedule it on a slower cadence than the main suite.
# =============================================================================
THROUGHPUT_ENABLED=0
# curl-based HTTP speed test -- needs no extra packages (curl is already a
# dependency). This is the default method.
THROUGHPUT_USE_CURL=1
CURL_SPEEDTEST_DOWN_URL="https://speed.cloudflare.com/__down?bytes="  # ?bytes=N appended
CURL_SPEEDTEST_UP_URL="https://speed.cloudflare.com/__up"            # empty to skip upload
CURL_SPEEDTEST_BYTES=25000000   # ~25 MB moved per direction
CURL_SPEEDTEST_MAXTIME=30        # seconds cap per direction
# Optional extras (off by default; speedtest-cli is a separate package):
THROUGHPUT_USE_SPEEDTEST=0     # use speedtest-cli if available
IPERF_SERVER=""                # e.g. "10.0.0.50" for an internal iperf3 -s host
IPERF_PORT=5201

# =============================================================================
# ntp  -- clock offset vs a reference (drift can expire tokens/certs early)
# =============================================================================
NTP_ENABLED=1
NTP_REFERENCE="pool.ntp.org"
